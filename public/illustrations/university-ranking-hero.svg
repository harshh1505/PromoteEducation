  <rect x="970" y="380" width="15" height="30" stroke="#071A44" stroke-width="0.75" />

  <rect x="610" y="440" width="15" height="30" stroke="#071A44" stroke-width="0.75" />
  <rect x="640" y="440" width="15" height="30" stroke="#071A44" stroke-width="0.75" />
  <rect x="670" y="440" width="15" height="30" stroke="#071A44" stroke-width="0.75" />
  <rect x="910" y="440" width="15" height="30" stroke="#071A44" stroke-width="0.75" />
  <rect x="940" y="440" width="15" height="30" stroke="#071A44" stroke-width="0.75" />
