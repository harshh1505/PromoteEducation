  <path d="M 200 50 L 200 520 M 400 50 L 400 520 M 600 50 L 600 520 M 800 50 L 800 520 M 1000 50 L 1000 520 M 1200 50 L 1200 520 M 1400 50 L 1400 520" stroke="#071A44" stroke-width="0.5" stroke-opacity="0.1" stroke-dasharray="4 4" />

