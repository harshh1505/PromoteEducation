  <rect x="805" y="275" width="25" height="10" fill="#FFFFFF" stroke="#071A44" stroke-width="1" />
  <rect x="805" y="515" width="25" height="10" fill="#FFFFFF" stroke="#071A44" stroke-width="1" />
  <!-- Pillar 4 -->
  <rect x="860" y="280" width="15" height="240" fill="#FFFFFF" stroke="#071A44" stroke-width="1" />
  <rect x="855" y="275" width="25" height="10" fill="#FFFFFF" stroke="#071A44" stroke-width="1" />
  <rect x="855" y="515" width="25" height="10" fill="#FFFFFF" stroke="#071A44" stroke-width="1" />

